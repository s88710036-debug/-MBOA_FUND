databases:
  - name: tontinedb
    databaseName: tontinedb
    ipAllowList: []

services:
  - type: web
    name: tontine-app
    runtime: python
    buildCommand: "pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput"
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 4
    healthCheckPath: /
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: false
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: DATABASE_URL
        fromDatabase:
          name: tontinedb
          property: connectionString

  - type: worker
    name: tontine-worker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py qcluster
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: DATABASE_URL
        fromDatabase:
          name: tontinedb
          property: connectionString

  - type: cron
    name: tontine-beat
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py qbeat
    schedule: "*/5 * * * *"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: DATABASE_URL
        fromDatabase:
          name: tontinedb
          property: connectionString
