{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Inscription - TontineApp{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-lg border-0">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-person-plus display-4 text-primary"></i>
                        <h2 class="mt-2">Créer un compte</h2>
                        <p class="text-muted">Rejoignez TontineApp et commencez à cotiser</p>
                    </div>

                    <form method="post">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <button type="submit" class="btn btn-primary btn-lg w-100 mt-3">
                            <i class="bi bi-check-circle me-2"></i>Créer mon compte
                        </button>
                    </form>

                    <p class="text-center mt-3 text-muted">
                        Déjà un compte ? <a href="{% url 'accounts:login' %}">Se connecter</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
