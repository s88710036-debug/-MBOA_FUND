{% extends "base.html" %}

{% block content %}
<div class="container">
  <h3>Réinitialiser le mot de passe</h3>
  <p>Entrez votre adresse e-mail pour recevoir un lien de réinitialisation.</p>
  <form method="post">
    {% csrf_token %}
    {{ form.email.label_tag }}
    {{ form.email }}
    <button class="btn btn-primary mt-2" type="submit">Envoyer</button>
  </form>
</div>
{% endblock %}
