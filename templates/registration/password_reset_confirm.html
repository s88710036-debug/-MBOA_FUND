{% extends "base.html" %}

{% block content %}
<div class="container">
  <h3>Choisissez un nouveau mot de passe</h3>
  <form method="post">
    {% csrf_token %}
    {{ form.new_password1.label_tag }}
    {{ form.new_password1 }}
    {{ form.new_password2.label_tag }}
    {{ form.new_password2 }}
    <button class="btn btn-primary mt-2" type="submit">Réinitialiser</button>
  </form>
</div>
{% endblock %}
